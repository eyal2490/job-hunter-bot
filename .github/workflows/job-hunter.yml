name: Job Hunter

on:
  # Every 15 minutes - balance freshness with LinkedIn rate limits
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: job-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.db || true
          git diff --cached --quiet || git commit -m "chore: update seen_jobs.db"
          git push || true
